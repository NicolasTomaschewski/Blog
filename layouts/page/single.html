{{ define "main" }}
<article class="article">
  <div class="container">
    <header class="article-header">
      <h1 class="article-title">{{ .Title }}</h1>
      {{- with .Params.description }}
      <p class="article-lead">{{ . }}</p>
      {{- end }}
    </header>
    <div class="article-body prose">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
